# cargo-deny configuration: license compliance, dependency bans, and sources.
# Run locally with:  cargo deny check

[advisories]
version = 2
# Vulnerabilities are also covered by the cargo-audit workflow; keep this in sync.
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses that are compatible with this project's GPL-3.0-or-later,
# plus the project's own license. Extend if a new dependency needs it.
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]

[bans]
# The GTK stack legitimately pulls multiple versions of small crates.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
