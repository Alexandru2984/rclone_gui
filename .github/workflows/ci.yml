name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: core (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install rsync (for end-to-end tests)
        run: sudo apt-get update && sudo apt-get install -y rsync
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (core)
        run: cargo clippy -p cascade-core --all-targets -- -D warnings
      - name: test (core)
        run: cargo test -p cascade-core

  gui:
    name: gui (build with GTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 + libadwaita dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (gui)
        run: cargo clippy -p cascade-gui --all-targets -- -D warnings
      - name: build (gui)
        run: cargo build -p cascade-gui --release

  packaging:
    name: packaging (desktop + appstream)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream
      - name: Validate desktop entry
        run: desktop-file-validate packaging/io.github.alexmihai.Cascade.desktop
      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net packaging/io.github.alexmihai.Cascade.metainfo.xml
